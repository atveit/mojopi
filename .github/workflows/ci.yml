name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-24.04]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          cache: true

      - name: Install environment
        run: pixi install

      - name: Run tests (Mojo + Python)
        run: pixi run test

      - name: Check Mojo formatting
        run: pixi run format-check

      - name: C1 smoke gate (MAX version via Python interop)
        run: pixi run smoke
