[workspace]
name = "mojopi"
description = "Mojo/MAX port of pi-mono — a fully local coding agent"
authors = ["mojopi contributors"]
channels = [
    "https://conda.modular.com/max-nightly/",
    "conda-forge",
]
platforms = ["osx-arm64", "linux-64"]

[dependencies]
# Mojo SDK / MAX engine — pinned to the 26.2 series per PLAN.md §4 C1.
max = "26.2.*"
# Python pipeline layer (TextGenerationPipeline, tokenizers, GGUF loader)
# lives in a separate package and pulls pydantic/transformers/click/av/etc.
max-pipelines = "*"
python = "3.12.*"
pytest = "*"

[tasks]
# Full test suite — delegates to scripts/test.sh so all path/env plumbing
# lives in one place (PYTHONPATH, mojo -I src).
test = "bash scripts/test.sh"
test-mojo = "bash -c 'for f in tests/test_*.mojo; do echo running $f; PYTHONPATH=src mojo run -I src \"$f\" || exit 1; done'"
test-python = "bash -c 'PYTHONPATH=src pytest tests/ -v'"

# Formatting.
format = "mojo format src/ tests/"
format-check = "bash scripts/format-check.sh"

# Run the binary. scripts/run.sh sets PYTHONPATH and -I src for Mojo
# and Python module resolution. Usage: `pixi run run -- -p "hello"`.
run = "bash scripts/run.sh"

# C1 smoke gate: exercise the Mojo→Python→MAX bridge end-to-end.
# Delegates to scripts/smoke.sh, which invokes the Mojo smoke driver; the
# driver calls get_max_version() in max_brain/pipeline.py. This is the true
# C1 gate — it verifies Python interop works, not just that `max` imports.
smoke = "bash scripts/smoke.sh"
